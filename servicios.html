<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERVICIOS - Oficina Técnica</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="logo-32x32.png" />
  <script src="https://kit.fontawesome.com/6b48925c26.js" crossorigin="anonymous"></script>
</head>
<body class="servicios">
  <nav class="nav-bar">
    <div class="left-group">
      <a href="index.html" title="INICIO"><i class="fa-sharp fa-solid fa-house"></i></a>
      <a href="informacion.html" title="INFORMACIÓN"><i class="fa-solid fa-file"></i></a>
      <a href="contacto.html" title="CONTACTO"><i class="fa-solid fa-user"></i></a>
    </div>
  </nav>

  <main class="container py-4">
    <header class="text-center mb-4">
      <h1>Servicios Técnicos</h1>
    </header>

    <div class="servicio-grid">
      <div class="servicio-card" onclick="verSeccion('camaras')">
        <i class="fa-solid fa-video"></i>
        <h3>Seguridad</h3>
      </div>
      <div class="servicio-card" onclick="verSeccion('it')">
        <i class="fa-solid fa-desktop"></i>
        <h3>Informática</h3>
      </div>
      <div class="servicio-card" onclick="verSeccion('comms')">
        <i class="fa-solid fa-phone"></i>
        <h3>Comunicaciones</h3>
      </div>
    </div>

    <!-- Secciones Dinámicas -->
    <section id="camaras" class="detalle-servicio">
      <div class="galeria-fotos">
        <img src="camara 1.jfif" alt="CCTV 1">
        <img src="camara 2.jfif" alt="CCTV 2">
      </div>
      <ul class="list-group">
        <li class="list-group-item">CCTV Completo ($45000) <button onclick="sumarItem('CCTV', 45000)">+</button></li>
      </ul>
    </section>

    <section class="presupuesto-area mt-5">
      <h2>Presupuesto Final</h2>
      <div class="table-responsive">
        <table class="table">
          <thead><tr><th>Servicio</th><th>Costo</th><th>Acción</th></tr></thead>
          <tbody id="cuerpo-tabla"></tbody>
        </table>
      </div>
      <h3 class="text-end">Total: $<span id="total-final">0</span></h3>
      <div class="text-end no-imprimir">
        <button class="btn btn-success" onclick="window.print()">Imprimir</button>
        <button class="btn btn-danger" onclick="limpiarTodo()">Limpiar</button>
      </div>
    </section>
  </main>

  <script>
    let carrito = JSON.parse(localStorage.getItem('servicios_guardados')) || [];
    dibujarCarrito();

    function verSeccion(id) {
      document.querySelectorAll('.detalle-servicio').forEach(s => s.style.display = "none");
      document.getElementById(id).style.display = "block";
    }

    function sumarItem(n, p) { carrito.push({nombre:n, precio:p}); actualizar(); }
    function eliminarItem(i) { carrito.splice(i, 1); actualizar(); }
    function limpiarTodo() { if(confirm("¿Borrar?")) { carrito=[]; actualizar(); } }
    function actualizar() { localStorage.setItem('servicios_guardados', JSON.stringify(carrito)); dibujarCarrito(); }

    function dibujarCarrito() {
      const tabla = document.getElementById('cuerpo-tabla');
      let total = 0;
      tabla.innerHTML = carrito.map((item, i) => {
        total += item.precio;
        return `<tr><td>${item.nombre}</td><td>$${item.precio}</td><td><button onclick="eliminarItem(${i})">X</button></td></tr>`;
      }).join('');
      document.getElementById('total-final').innerText = total;
    }
  </script>
</body>
</html>
