<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INFORMACION - Oficina Técnica</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="logo-32x32.png" />
  <script src="https://kit.fontawesome.com/6b48925c26.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.17.0/dist/xlsx.full.min.js"></script>
</head>
<body class="informacion">
  <nav class="nav-bar">
    <div class="left-group">
      <a href="index.html" title="INICIO"><i class="fa-sharp fa-solid fa-house"></i></a>
      <a href="servicios.html" title="SERVICIOS"><i class="fa-solid fa-screwdriver-wrench"></i></a>
      <a href="contacto.html" title="CONTACTO"><i class="fa-solid fa-user"></i></a>
    </div>
  </nav>

  <main class="container py-4 text-center">
    <section class="excel-loader mb-5">
      <h2>📄 Gestión de Archivos Técnicos</h2>
      <p>Cargue su listado de tareas o números telefónicos en formato .xlsx</p>
      <input type="file" id="archivoExcel" accept=".xlsx" class="mb-2" />
      <br>
      <button onclick="leerExcel()" class="btn-accion">Procesar Archivo</button>
    </section>

    <div id="resultado-excel" class="table-responsive mt-4">
      <!-- Aquí aparecerá la tabla del Excel sin abrir ventanas nuevas -->
    </div>
  </main>

  <script>
    function leerExcel() {
      const archivo = document.getElementById("archivoExcel").files[0];
      if (!archivo) return alert("Seleccioná un archivo.");

      const lector = new FileReader();
      lector.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        const htmlTabla = XLSX.utils.sheet_to_html(workbook.Sheets[workbook.SheetNames[0]]);
        document.getElementById("resultado-excel").innerHTML = htmlTabla;
      };
      lector.readAsArrayBuffer(archivo);
    }
  </script>
</body>
</html>
