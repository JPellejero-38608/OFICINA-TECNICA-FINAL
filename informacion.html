<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INFORMACION - Oficina Técnica</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="logo-32x32.png" />
  <script src="https://kit.fontawesome.com/6b48925c26.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.17.0/dist/xlsx.full.min.js"></script>

  <style>
    body.informacion {
      background-image: url('mantenimiento.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
      color: #fff;
      padding: 40px;
      text-align: center;
    }

    .loader-box {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #ffd700;
      display: inline-block;
      margin-top: 20px;
    }

    .btn-cargar {
      background-color: #ffd700;
      color: #000;
      font-weight: bold;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #resultado-excel {
      margin-top: 30px;
      background: white;
      color: #333;
      border-radius: 8px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ccc; }
  </style>
</head>

<body class="informacion">
  <nav class="nav-bar">
    <div class="left-group">
      <a href="index.html" title="INICIO"><i class="fa-sharp fa-solid fa-house"></i></a>
      <a href="servicios.html" title="SERVICIOS"><i class="fa-solid fa-screwdriver-wrench"></i></a>
      <a href="contacto.html" title="CONTACTO"><i class="fa-solid fa-user"></i></a>
    </div>
  </nav>

  <main>
    <h2>LISTADOS TELEFÓNICOS</h2>
    <h2>NÚMEROS DE EMERGENCIAS</h2>
    <h2>TAREAS REALIZADAS</h2>

    <div class="loader-box">
      <h3>📄 Cargar archivo Excel</h3>
      <input type="file" id="archivoExcel" accept=".xlsx" style="margin-bottom: 15px;" />
      <br>
      <button onclick="leerExcel()" class="btn-cargar">Visualizar Listado</button>
    </div>

    <div id="resultado-excel"></div>
  </main>

  <script>
    function leerExcel() {
      const archivo = document.getElementById("archivoExcel").files[0];
      if (!archivo) return alert("Por favor, seleccione un archivo .xlsx");

      const lector = new FileReader();
      lector.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        const htmlTabla = XLSX.utils.sheet_to_html(workbook.Sheets[workbook.SheetNames[0]]);
        document.getElementById("resultado-excel").innerHTML = htmlTabla;
      };
      lector.readAsArrayBuffer(archivo);
    }
  </script>
</body>
</html>
